<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Реєстрація на курс</title>
  </head>
  <body>
    <form>
      <fieldset>
        <legend>Особисті дані</legend>
        <label for="first-name">Ім’я</label>
        <input type="text" id="first-name" required />
        <label for="last-name">Прізвище</label>
        <input type="text" id="last-name" required />
        <label for="email">Електронна пошта</label>
        <input type="email" id="email" required />
        <label for="password">Пароль</label>
        <input type="password" id="password" minlength="6" required />
        <label for="confirm-password">Підтвердження пароля</label>
        <input type="password" id="confirm-password" required />
        <label for="birth-date">Дата народження</label>
        <input type="date" id="birth-date" required />
      </fieldset>
      <fieldset>
        <legend>Навчальні дані</legend>
        <label for="specialty">Спеціальність</label>

        <select id="specialty" required>
          <option value="">Оберіть спеціальність</option>
          <option>Комп’ютерні науки</option>
          <option>Кібербезпека</option>
          <option>Дизайн</option>
        </select>
      </fieldset>

      <label>
        <input type="checkbox" required />
        Я погоджуюсь з правилами
      </label>
      <button type="submit">Зареєструватися</button>
    </form>
  </body>
</html>
