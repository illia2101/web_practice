<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Buy List</title>
    <link rel="stylesheet" href="main.css" />
    <script defer src="main.js"></script>
  </head>
  <body>
    <div class="container">
      <main class="buy-list">
        <form class="add-form">
          <label for="product-name" class="visually-hidden">Назва товару</label>
          <input
            type="text"
            id="product-name"
            placeholder="Назва товару"
            required
          />
          <button type="submit" data-tooltip="Додати товар">Додати</button>
        </form>
        <ul class="products">
          <li class="product-item">
            <span class="product-name bought">Помідори</span>
            <div class="counter test-counter">
              <span class="quantity">2</span>
            </div>
            <div class="actions">
              <button
                class="status-button"
                data-tooltip="Позначити як не куплено"
              >
                Не куплено
              </button>
            </div>
          </li>

          <li class="product-item">
            <span class="product-name">Печиво</span>
            <div class="counter">
              <button class="decrease" data-tooltip="Зменшити кількість">
                -
              </button>
              <span class="quantity">2</span>
              <button class="increase" data-tooltip="Збільшити кількість">
                +
              </button>
            </div>
            <div class="actions">
              <button class="status-button" data-tooltip="Позначити як куплено">
                Куплено
              </button>
              <button
                class="delete"
                aria-label="Видалити товар"
                data-tooltip="Видалити товар"
              >
                ✖
              </button>
            </div>
          </li>

          <li class="product-item">
            <input type="text" value="Сир" class="edit-input" />
            <div class="counter">
              <button
                class="decrease disabled"
                data-tooltip="Зменшити кількість"
              >
                -
              </button>
              <span class="quantity">1</span>
              <button class="increase" data-tooltip="Збільшити кількість">
                +
              </button>
            </div>
            <div class="actions">
              <button class="status-button" data-tooltip="Позначити як куплено">
                Куплено
              </button>
              <button
                class="delete"
                aria-label="Видалити товар"
                data-tooltip="Видалити товар"
              >
                ✖
              </button>
            </div>
          </li>
        </ul>
      </main>

      <aside class="sidebar">
        <section class="sidebar-block">
          <h2>Залишилося</h2>
          <div class="badge-list">
            <div class="item-badge">
              Печиво
              <span class="badge-count">2</span>
            </div>
            <div class="item-badge">
              Сир
              <span class="badge-count">1</span>
            </div>
          </div>
        </section>
        <section class="sidebar-block">
          <h2>Куплено</h2>
          <div class="badge-list">
            <div class="item-badge">
              <span class="bought">Помідори</span>
              <span class="badge-countPo">2</span>
            </div>
          </div>
        </section>
      </aside>
    </div>
    <div class="badge">
      <span class="badge-title">BuyList</span>
      <span class="badge-author">Робота: Кабиш Ілля</span>
    </div>
  </body>
</html>
