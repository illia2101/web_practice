<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="card.css" />
    <title>Document</title>
  </head>
  <body>
    <div class="card">
      <img
        src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT-K-Zf68R_tl_S3GY_qm3G-F4U_45V6J12-82PDxTcCpYwYl_2TtPRx6bJDTIGITFIKw6-pCKnyn2t1v54w0a3Xc_P3dPTZkQVhnypvQ&s=10"

      />

      <div class="card-content">
        <h3>Назва товару</h3>

        <p class="meta">Категорія • 2026</p>

        <p class="description">
          Дуже довгий опис товару який може не поміщатися і тому обрізається на
          двох рядках із трикрапкою.
        </p>

        <p class="price">$49</p>

        <button>Купити</button>
      </div>
    </div>
  </body>
</html>
