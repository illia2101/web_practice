<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Task 5 — To-do список</title>
  <style>
    body { font-family: -apple-system, sans-serif; max-width: 560px; margin: 2rem auto; padding: 1rem; line-height: 1.5; }
    h1 { color: #2050a0; }
    #add-form { display: flex; gap: 6px; margin-bottom: 1.5rem; }
    #new-task { flex: 1; padding: 8px; font-size: 1rem; border: 1px solid #ccd; border-radius: 4px; }
    #add-form button, #clear-done {
      padding: 8px 16px; background: #2050a0; color: white;
      border: none; border-radius: 4px; cursor: pointer;
    }
    #task-list { list-style: none; padding: 0; margin: 0; }
    #task-list li {
      display: flex; align-items: center; gap: 8px;
      padding: 8px; border-bottom: 1px solid #eee;
    }
    #task-list li.done span.task-text {
      text-decoration: line-through;
      color: #888;
    }
    #task-list .task-text { flex: 1; }
    #task-list .delete {
      background: transparent; border: none; cursor: pointer;
      font-size: 1.2rem; color: #c33;
    }
    .footer-bar {
      display: flex; justify-content: space-between;
      margin-top: 1rem;
      align-items: center;
    }
    #counter { color: #555; }
    #clear-done { background: #888; }
    #clear-done:hover { background: #666; }
  </style>
</head>
<body>

  <h1>Що зробити сьогодні</h1>

  <form id="add-form">
    <input id="new-task" type="text" placeholder="Нова задача">
    <button type="submit">Додати</button>
  </form>

  <ul id="task-list">
    <!-- Тут будуть з'являтись li через JS -->
  </ul>

  <div class="footer-bar">
    <span id="counter">0 з 0 завершено</span>
    <button id="clear-done">Видалити завершені</button>
  </div>

  <script src="todo.js"></script>
</body>
</html>
